<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>CGPlay · Movie / Series Details</title>
    <meta name="description" content="Download the latest movies and web series in HD – 480p, 720p, 1080p. Direct links, no ads.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://cgplay.fun/movie">
    <!-- Favicon etc. (keep as before) -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="CGPlay – Movie Details">
    <meta property="og:description" content="Direct download links, screenshots, and more.">
    <meta property="og:image" content="https://placehold.co/1200x630/0d0d17/e50914?text=CGPLAY">
    <meta property="og:url" content="https://cgplay.fun/movie">
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ---------- SAME CINEMA DARK THEME AS INDEX, FULLY RESPONSIVE ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0e;
            background: radial-gradient(circle at 30% 10%, #14141c 0%, #0b0b10 90%);
            color: #f0f0fa;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .site-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: rgba(8,8,12,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(229,9,20,0.25);
            padding: 0.8rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .site-logo {
            width: 150px;
            max-height: 52px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px #e5091466);
            transition: filter 0.2s;
            border-radius: 8px;
        }
        .site-logo:hover { filter: drop-shadow(0 0 12px #e50914); }
        .brand-text {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to right, #ffffff, #d4d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .brand-text span { color: #e50914; background: none; }
        .header-right { display: flex; align-items: center; gap: 1.2rem; }
        .filebase-badge {
            background: #1e1e28;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b0b8ff;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        /* Main container */
        .movie-download-container {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 2rem;
            width: 100%;
            flex: 1;
        }
        .movie-hero {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 2rem;
            margin-bottom: 2.5rem;
            background: rgba(16,16,24,0.6);
            border-radius: 36px;
            padding: 1.8rem 2rem;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .movie-poster-large {
            width: 200px;
            height: 300px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 18px 30px -10px black;
            border: 1px solid rgba(229,9,20,0.3);
        }
        .hero-details { flex: 1; }
        .movie-title-xl {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #d6dbff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .movie-year-genre {
            color: #a0a8c0;
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .badge-4k {
            background: #e50914;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .movie-description-full {
            font-size: 1rem;
            color: #d1d5e0;
            max-width: 700px;
            line-height: 1.6;
            margin-top: 0.6rem;
        }

        /* Screenshot grid – horizontal scroll on mobile */
        .screenshot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            margin: 2.8rem 0 2rem;
        }
        .screenshot-item {
            background: #0f0f17;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2a2a36;
            transition: all 0.25s ease;
            box-shadow: 0 20px 30px -10px black;
        }
        .screenshot-item:hover {
            transform: scale(1.01);
            border-color: #e50914;
        }
        .screenshot-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
        }
        .screenshot-caption {
            padding: 0.7rem 1rem;
            font-size: 0.8rem;
            color: #9aa1b9;
            background: #15151f;
            border-top: 1px solid #2c2c3a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Download panel (for movies) */
        .download-panel {
            background: linear-gradient(145deg, #12121c, #0c0c14);
            border-radius: 40px;
            padding: 2rem 2.2rem;
            margin: 2rem 0 1.5rem;
            border: 1px solid rgba(229,9,20,0.2);
            box-shadow: 0 25px 35px -15px black;
        }
        .download-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .download-title i { color: #e50914; }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: center;
        }
        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1e1e2a;
            color: white;
            font-weight: 700;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            box-shadow: 0 10px 16px -8px black;
            flex: 0 1 auto;
        }
        .btn-480p { background: #2c2c3a; border-bottom: 3px solid #3b82f6; }
        .btn-720p { background: #2c2c3a; border-bottom: 3px solid #eab308; }
        .btn-1080p { background: #2c2c3a; border-bottom: 3px solid #22c55e; }
        .btn-download:hover {
            background: #e50914;
            border-bottom-color: white;
            transform: translateY(-3px);
        }
        .file-info {
            margin-top: 1.5rem;
            color: #8a94a6;
            font-size: 0.85rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            border-top: 1px solid #262632;
            padding-top: 1.5rem;
        }

        /* Episodes list (for web series) */
        .episodes-section {
            margin: 2.5rem 0 1.5rem;
        }
        .episodes-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #e50914;
            padding-bottom: 0.5rem;
        }
        .episode-card {
            background: #16161f;
            border-radius: 28px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #2a2a36;
            transition: all 0.2s;
        }
        .episode-card:hover {
            border-color: #e50914;
            box-shadow: 0 15px 25px -12px black;
        }
        .episode-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: white;
        }
        .episode-downloads {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .episode-downloads .btn-download {
            padding: 0.7rem 1.5rem;
            font-size: 0.9rem;
        }

        /* Metadata panel */
        .movie-metadata-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            background: rgba(10,10,18,0.7);
            border-radius: 28px;
            padding: 1.6rem 2rem;
            margin: 2rem 0 1rem;
            backdrop-filter: blur(8px);
            border: 1px solid #2a2a36;
        }
        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .meta-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 1px;
        }
        .meta-value {
            font-weight: 600;
            font-size: 1rem;
            color: white;
        }

        footer {
            text-align: center;
            padding: 1.8rem;
            color: #6b7280;
            border-top: 1px solid #1f2937;
            margin-top: 2rem;
            background: rgba(6,6,10,0.8);
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        /* Loading / error states */
        .status-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2.8rem 1.5rem;
            background: rgba(20,20,30,0.5);
            border-radius: 60px;
            color: #a0a0b0;
            font-size: 1.2rem;
            border: 1px dashed #4b5563;
            backdrop-filter: blur(10px);
            margin: 2rem 0;
        }

        /* Responsive */
        @media (max-width: 800px) {
            .site-header { padding: 0.8rem 1.2rem; }
            .brand-text { font-size: 1.8rem; }
            .site-logo { width: 130px; }
            .filebase-badge span { display: none; }
            .filebase-badge { padding: 0.4rem 0.8rem; }
            .movie-download-container { padding: 0 1.2rem; }
        }
        @media (max-width: 700px) {
            .movie-hero { flex-direction: column; align-items: center; text-align: center; padding: 1.5rem; }
            .movie-poster-large { width: 160px; height: 240px; }
            .movie-title-xl { font-size: 2rem; }
            .screenshot-grid {
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 1rem;
                margin: 1.8rem 0 1.5rem;
                padding-bottom: 0.5rem;
                -webkit-overflow-scrolling: touch;
            }
            .screenshot-grid::-webkit-scrollbar { height: 6px; }
            .screenshot-grid::-webkit-scrollbar-track { background: #1e1e2a; border-radius: 10px; }
            .screenshot-grid::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
            .screenshot-item {
                flex: 0 0 85%;
                scroll-snap-align: start;
            }
            .button-group { justify-content: center; }
            .btn-download { padding: 0.8rem 1.5rem; }
            .episode-card { padding: 1.2rem; }
        }
        @media (max-width: 500px) {
            .movie-title-xl { font-size: 1.8rem; }
            .download-panel { padding: 1.5rem; }
            .btn-download { width: 100%; justify-content: center; }
            .screenshot-item { flex: 0 0 90%; }
        }
        @media (max-width: 360px) {
            .movie-poster-large { width: 140px; height: 210px; }
            .movie-title-xl { font-size: 1.6rem; }
            .screenshot-item { flex: 0 0 95%; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="logo-container">
            <a href="index.html" class="logo-link">
                <img class="site-logo" 
                     src="https://placehold.co/200x70/0d0d17/e50914?text=CGPLAY&font=montserrat" 
                     alt="CGPlay official logo"
                     onerror="this.src='https://via.placeholder.com/200x70/0a0a12/fff?text=CGPLAY';">
            </a>
            <span class="brand-text"><span>CGP</span>LAY</span>
        </div>
        <div class="header-right">
            <a href="index.html" style="color:white; text-decoration:none; font-weight:500;"><i class="fas fa-home"></i> Home</a>
            <div class="filebase-badge">
                <i class="fas fa-database"></i> 
                <span>FILE BASE</span>
            </div>
        </div>
    </header>

    <main class="movie-download-container" id="movieContainer">
        <!-- Dynamic content will be injected here -->
        <div class="status-message">
            <i class="fas fa-spinner fa-pulse"></i> loading details...
        </div>
    </main>

    <footer>
        <span>© 2025 CGPLAY.FUN — cinema direct</span>
        <span><i class="fas fa-cloud"></i> live from Firestore</span>
    </footer>

    <!-- Firebase SDK (v12.9.0 modular) -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, doc, getDoc } from "firebase/firestore";

        // ---------- Firebase config (identical to admin panel) ----------
        const firebaseConfig = {
            apiKey: "AIzaSyAYV2Wbo67_iqvMrmH9vT_4F4kYBKRLFWA",
            authDomain: "cgplay-a2384.firebaseapp.com",
            projectId: "cgplay-a2384",
            storageBucket: "cgplay-a2384.firebasestorage.app",
            messagingSenderId: "778930899763",
            appId: "1:778930899763:web:0edca39ca044d421cf8c46",
            measurementId: "G-X16NPMVFFQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ---------- Get movie/series ID from URL ----------
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');  // document ID

        const container = document.getElementById('movieContainer');

        async function loadItem() {
            if (!itemId) {
                container.innerHTML = `<div class="status-message" style="color:#ffb3b3;">
                    <i class="fas fa-exclamation-triangle"></i> No ID specified.<br>
                    <span style="font-size:1rem;">Go back to <a href="index.html" style="color:#e50914;">homepage</a>.</span>
                </div>`;
                return;
            }

            try {
                const docRef = doc(db, 'movies', itemId);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    container.innerHTML = `<div class="status-message">
                        <i class="fas fa-database"></i> Item not found.<br>
                        <span style="font-size:1rem;">It may have been removed.</span>
                    </div>`;
                    return;
                }

                const data = docSnap.data();
                renderItem(data);

            } catch (error) {
                console.error('Firebase error:', error);
                container.innerHTML = `<div class="status-message" style="color:#ffb3b3;">
                    <i class="fas fa-exclamation-triangle"></i> Failed to load.<br>
                    <span style="font-size:0.9rem;">${error.message}</span>
                </div>`;
            }
        }

        function renderItem(item) {
            // Helper to safely get field or fallback
            const get = (field, fallback = '') => item[field] !== undefined ? item[field] : fallback;

            // Common fields
            const title = get('name', 'Untitled');
            const year = get('year', '');
            const genre = get('genre', '');
            const runtime = get('runtime', '');
            const poster = get('logoUrl', 'https://placehold.co/600x900/1a1a24/fff?text=NO+POSTER');
            const description = get('description', 'No description available.');
            const screenshot1 = get('screenshot1', 'https://placehold.co/1280x720/1e1e2a/bbb?text=NO+SCREENSHOT');
            const screenshot2 = get('screenshot2', 'https://placehold.co/1280x720/22222e/ccc?text=NO+SCREENSHOT');
            const caption1 = get('screenshot1_caption', 'Scene 1');
            const caption2 = get('screenshot2_caption', 'Scene 2');

            // Metadata
            const imdbRating = get('imdbRating', '');
            const audio = get('audio', '');
            const subtitles = get('subtitles', '');
            const format = get('format', '');

            // Determine type
            const type = get('type', 'movie'); // default to movie if not set

            // Start building HTML
            let html = `
                <!-- Hero section -->
                <div class="movie-hero">
                    <img class="movie-poster-large" src="${poster}" alt="${title} poster" loading="lazy">
                    <div class="hero-details">
                        <div class="movie-title-xl">${title} ${year ? `<span style="font-size:1rem; color:#e50914;">${year}</span>` : ''}</div>
                        <div class="movie-year-genre">
                            ${genre ? `<span><i class="fas fa-film" style="color:#e50914;"></i> ${genre}</span>` : ''}
                            ${runtime ? `<span><i class="fas fa-clock" style="color:#e50914;"></i> ${runtime}</span>` : ''}
                            <span class="badge-4k"><i class="fas fa-download"></i> 4K ready</span>
                        </div>
                        <div class="movie-description-full">${description}</div>
                    </div>
                </div>

                <!-- Screenshots grid -->
                <div class="screenshot-grid">
                    <div class="screenshot-item">
                        <img class="screenshot-img" src="${screenshot1}" alt="${title} screenshot 1" loading="lazy">
                        <div class="screenshot-caption"><i class="fas fa-scroll" style="color:#e50914;"></i> ${caption1}</div>
                    </div>
                    <div class="screenshot-item">
                        <img class="screenshot-img" src="${screenshot2}" alt="${title} screenshot 2" loading="lazy">
                        <div class="screenshot-caption"><i class="fas fa-heart" style="color:#e50914;"></i> ${caption2}</div>
                    </div>
                </div>
            `;

            // ----- DOWNLOAD SECTION (depends on type) -----
            if (type === 'movie') {
                // Movie: show three quality buttons
                const download480p = get('download480p', '');
                const download720p = get('download720p', '');
                const download1080p = get('download1080p', '');

                html += `
                    <div class="download-panel">
                        <div class="download-title"><i class="fas fa-download"></i> Direct download – choose quality</div>
                        <div class="button-group">
                            ${download480p ? `<a href="${download480p}" class="btn-download btn-480p" target="_blank" rel="noopener noreferrer"><i class="fas fa-video"></i> 480p (SD)</a>` : ''}
                            ${download720p ? `<a href="${download720p}" class="btn-download btn-720p" target="_blank" rel="noopener noreferrer"><i class="fas fa-hd-video"></i> 720p (HD)</a>` : ''}
                            ${download1080p ? `<a href="${download1080p}" class="btn-download btn-1080p" target="_blank" rel="noopener noreferrer"><i class="fas fa-film"></i> 1080p (FHD)</a>` : ''}
                        </div>
                        <div class="file-info">
                            <span><i class="fas fa-database"></i> Filebase secure storage</span>
                            <span><i class="fas fa-shield-alt"></i> No registration, no ads</span>
                            <span><i class="fas fa-clock"></i> Updated: March 2025</span>
                        </div>
                    </div>
                `;
            } else if (type === 'series') {
                // Web series: show episodes list
                const episodes = get('episodes', []);
                if (episodes.length > 0) {
                    html += `<div class="episodes-section"><h2><i class="fas fa-list"></i> Episodes</h2>`;
                    episodes.forEach((ep, index) => {
                        const epTitle = ep.title || `Episode ${index+1}`;
                        const ep480 = ep.download480p || '';
                        const ep720 = ep.download720p || '';
                        const ep1080 = ep.download1080p || '';
                        html += `
                            <div class="episode-card">
                                <div class="episode-title">${epTitle}</div>
                                <div class="episode-downloads">
                                    ${ep480 ? `<a href="${ep480}" class="btn-download btn-480p" target="_blank" rel="noopener noreferrer"><i class="fas fa-video"></i> 480p</a>` : ''}
                                    ${ep720 ? `<a href="${ep720}" class="btn-download btn-720p" target="_blank" rel="noopener noreferrer"><i class="fas fa-hd-video"></i> 720p</a>` : ''}
                                    ${ep1080 ? `<a href="${ep1080}" class="btn-download btn-1080p" target="_blank" rel="noopener noreferrer"><i class="fas fa-film"></i> 1080p</a>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="status-message">No episodes listed yet.</div>`;
                }
            }

            // ----- METADATA PANEL (if any metadata exists) -----
            if (imdbRating || audio || subtitles || format) {
                html += `<div class="movie-metadata-panel">`;
                if (imdbRating) html += `<div class="meta-item"><span class="meta-label"><i class="fas fa-star"></i> IMDB</span><span class="meta-value">${imdbRating}</span></div>`;
                if (audio) html += `<div class="meta-item"><span class="meta-label"><i class="fas fa-language"></i> Audio</span><span class="meta-value">${audio}</span></div>`;
                if (subtitles) html += `<div class="meta-item"><span class="meta-label"><i class="fas fa-subtitles"></i> Subtitles</span><span class="meta-value">${subtitles}</span></div>`;
                if (format) html += `<div class="meta-item"><span class="meta-label"><i class="fas fa-folder-open"></i> Format</span><span class="meta-value">${format}</span></div>`;
                html += `</div>`;
            }

            container.innerHTML = html;
            document.title = `CGPlay · ${title} – download 480p/720p/1080p`;
        }

        loadItem();
    </script>
</body>
</html>
